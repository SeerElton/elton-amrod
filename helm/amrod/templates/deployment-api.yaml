apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "amrod.fullname" . }}-api
  labels:
    {{- include "amrod.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "amrod.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "amrod.api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
              protocol: TCP
          env:
            {{- toYaml .Values.api.env | nindent 12 }}
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "amrod.fullname" . }}-db-secret
                  key: connection-string
            - name: RabbitMq__HostName
              value: {{ include "amrod.fullname" . }}-rabbitmq
            - name: RabbitMq__UserName
              valueFrom:
                secretKeyRef:
                  name: {{ include "amrod.fullname" . }}-rabbitmq-secret
                  key: username
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "amrod.fullname" . }}-rabbitmq-secret
                  key: password
          {{- with .Values.api.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /swagger
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /swagger
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
