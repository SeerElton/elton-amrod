"""
OrderFlow GraphQL Schema

Read-only GraphQL endpoint for flexible order and customer queries.

Benefits over REST:
- Clients request only needed fields
- Single request for nested data
- N+1 query prevention with DataLoaders
- Multiple client support (web, mobile, dashboard)

Query Examples:

1. Get all orders for a customer with line items:
   query {
     orders(customerId: "12345678-1234-1234-1234-123456789012") {
       id
       createdAt
       totalAmount
       status
       lineItems {
         productSku
         quantity
         unitPrice
         lineTotal
       }
       customer {
         name
         email
       }
     }
   }

2. Get specific order with minimal data:
   query {
     order(id: "87654321-4321-4321-4321-210987654321") {
       id
       status
       totalAmount
     }
   }

3. Get customer with all orders:
   query {
     customer(id: "12345678-1234-1234-1234-123456789012") {
       id
       name
       email
       orders {
         id
         totalAmount
         status
       }
     }
   }

4. Dashboard - Top orders and customers:
   query {
     orders(status: "Fulfilled") {
       id
       totalAmount
       customer { name }
       lineItems { productSku quantity }
     }
     customers {
       id
       name
       orders { totalAmount }
     }
   }
"""
type Query {
  """
  Get all orders with optional filtering
  """
  orders(
    """
    Filter by customer ID
    """
    customerId: String
    """
    Filter by status (Pending, Paid, Fulfilled, Cancelled)
    """
    status: String
  ): [Order!]!

  """
  Get specific order by ID
  """
  order(id: String!): Order

  """
  Get all customers
  """
  customers: [Customer!]!

  """
  Get specific customer by ID
  """
  customer(id: String!): Customer
}

type Order {
  """
  Order unique identifier
  """
  id: String!

  """
  Customer who placed the order
  """
  customerId: String!

  """
  Order status
  """
  status: String!

  """
  Currency code (ISO 4217)
  """
  currencyCode: String!

  """
  Total order amount (calculated server-side)
  """
  totalAmount: Float!

  """
  Order creation timestamp
  """
  createdAt: DateTime!

  """
  Order line items
  """
  lineItems: [OrderLineItem!]!

  """
  Associated customer (N+1 prevention with DataLoader)
  """
  customer: Customer
}

type OrderLineItem {
  """
  Line item unique identifier
  """
  id: String!

  """
  Product SKU
  """
  productSku: String!

  """
  Quantity ordered
  """
  quantity: Int!

  """
  Unit price
  """
  unitPrice: Float!

  """
  Calculated line total (quantity × unitPrice)
  """
  lineTotal: Float!
}

type Customer {
  """
  Customer unique identifier
  """
  id: String!

  """
  Customer name
  """
  name: String!

  """
  Customer email
  """
  email: String!

  """
  ISO 3166-1 alpha-2 country code
  """
  countryCode: String!

  """
  Customer creation timestamp
  """
  createdAt: DateTime!

  """
  Customer's orders (N+1 prevention with DataLoader)
  """
  orders: [Order!]!
}

scalar DateTime
